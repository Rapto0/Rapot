name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ==================== LINT & FORMAT ====================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install ruff black isort

      - name: Ensure SQLite artifacts are not tracked
        run: |
          TRACKED_DB_FILES=$(git ls-files '*.db' '*.db-shm' '*.db-wal' '*.sqlite3')
          if [ -n "$TRACKED_DB_FILES" ]; then
            echo "Tracked SQLite files detected:"
            echo "$TRACKED_DB_FILES"
            exit 1
          fi

      - name: Detect changed Python files
        id: changed_py
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            FILES="$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" | grep -E '\.pyi?$' || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              FILES="$(git ls-files '*.py' '*.pyi')"
            else
              FILES="$(git diff --name-only --diff-filter=ACMRT "${BEFORE_SHA}...HEAD" | grep -E '\.pyi?$' || true)"
            fi
          fi

          {
            echo "files<<EOF"
            echo "${FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Ruff (linting)
        if: ${{ steps.changed_py.outputs.files != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t PY_FILES < <(printf '%s\n' "${{ steps.changed_py.outputs.files }}" | sed '/^[[:space:]]*$/d')
          ruff check --output-format=github "${PY_FILES[@]}"

      - name: Check Black formatting
        if: ${{ steps.changed_py.outputs.files != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t PY_FILES < <(printf '%s\n' "${{ steps.changed_py.outputs.files }}" | sed '/^[[:space:]]*$/d')
          black --check --diff "${PY_FILES[@]}"

      - name: Check import sorting
        if: ${{ steps.changed_py.outputs.files != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t PY_FILES < <(printf '%s\n' "${{ steps.changed_py.outputs.files }}" | sed '/^[[:space:]]*$/d')
          isort --check-only --diff "${PY_FILES[@]}"

      - name: Skip lint (no changed Python files)
        if: ${{ steps.changed_py.outputs.files == '' }}
        run: echo "No changed Python files detected; lint skipped."

  # ==================== TEST ====================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create dummy .env for tests
        run: |
          echo "TELEGRAM_TOKEN=test_token" >> .env
          echo "TELEGRAM_CHAT_ID=test_chat_id" >> .env
          echo "JWT_SECRET_KEY=test-secret-key" >> .env
          echo "ADMIN_PASSWORD=test123" >> .env
          echo "USER_PASSWORD=test123" >> .env

      - name: Detect changed test files
        id: changed_tests
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            TEST_FILES="$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" | grep -E '^tests/test_.*\.py$' || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              TEST_FILES="$(git ls-files 'tests/test_*.py')"
            else
              TEST_FILES="$(git diff --name-only --diff-filter=ACMRT "${BEFORE_SHA}...HEAD" | grep -E '^tests/test_.*\.py$' || true)"
            fi
          fi

          {
            echo "files<<EOF"
            echo "${TEST_FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run changed tests
        if: ${{ steps.changed_tests.outputs.files != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TEST_FILES < <(printf '%s\n' "${{ steps.changed_tests.outputs.files }}" | sed '/^[[:space:]]*$/d')
          pytest -v --cov=. --cov-report=xml "${TEST_FILES[@]}"

      - name: Run smoke tests (no changed test files)
        if: ${{ steps.changed_tests.outputs.files == '' }}
        run: |
          pytest tests/test_api_route_aliases.py tests/test_frontend_contracts.py -v --cov=. --cov-report=xml

  # ==================== SECURITY SCAN ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit (security linting)
        run: bandit -r . -x ./venv,./tests -f json -o bandit-report.json || true

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true

  # ==================== DOCKER BUILD ====================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: otonom-analiz:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
